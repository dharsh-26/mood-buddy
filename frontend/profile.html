<!-- Profile -->

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-4">

                    <div class="text-center">

                        

                        <h2 class="text-primary">
                            My Profile
                        </h2>

                        <p class="text-muted">
                            Manage your account information.
                        </p>

                    </div>

                    <form id="profileForm">

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="name"
                                placeholder="Enter your full name">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                id="email"
                            
                                >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                New Password
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                placeholder="Leave blank if you don't want to change it"
                                autocomplete="new-password">
                                <button
                        
                    class="btn btn-outline-secondary"
                type="button"
                id="togglePassword"
                👁️>
            </button>
                                

                        </div>
                        
    

                        

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Update Profile

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
